name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: version
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"

          if [[ -z "${latest_tag}" ]]; then
            base_version="$(grep -E '^version\s*=' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')"
            if [[ -z "${base_version}" ]]; then
              base_version="0.1.0"
            fi
            next_tag="v${base_version}"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          fi

          echo "latest_tag=${latest_tag:-<none>}"
          echo "next_tag=${next_tag}"
          echo "tag=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${next_tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --locked

      - name: Package artifact
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          artifact="windows-inspect-${version}-x86_64-pc-windows-msvc.exe"
          cp target/release/windows-inspect.exe "${artifact}"
          echo "artifact=${artifact}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.artifact }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
